<!DOCTYPE html>
<html lang="no" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Trening">
  <title>Trening</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ============ HOME ============ -->
  <section class="view active" id="v-home">
    <header class="topbar">
      <h1>Mine økter</h1>
      <button class="icon-btn" id="theme-toggle" aria-label="Bytt tema">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>
    <div class="scroll-area">
      <div class="card-list" id="programs-list">
        <div class="loading">Laster…</div>
      </div>
      <button class="add-row secondary" id="add-program-btn">+ Nytt program</button>
      <div class="week-card">
        <div class="week-header">
          <span>Denne uken</span>
          <button class="link" id="history-link">Se historikk</button>
        </div>
        <div class="week-grid" id="week-grid"></div>
      </div>
    </div>
  </section>

  <!-- ============ PROGRAM ============ -->
  <section class="view" id="v-program">
    <header class="topbar">
      <button class="icon-btn back-btn" id="back-from-program" aria-label="Tilbake">
        <svg width="10" height="18" viewBox="0 0 10 18" fill="none" aria-hidden="true">
          <path d="M9 1L1 9L9 17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 id="program-title"></h1>
      <button class="icon-btn more-btn" id="delete-program-btn" aria-label="Mer">
        <svg width="18" height="4" viewBox="0 0 18 4" fill="currentColor" aria-hidden="true">
          <circle cx="2" cy="2" r="1.8"/><circle cx="9" cy="2" r="1.8"/><circle cx="16" cy="2" r="1.8"/>
        </svg>
      </button>
    </header>
    <div class="scroll-area">
      <button class="add-row" id="add-exercise-btn">+ Legg til øvelse</button>
      <div class="card-list" id="exercises-list"></div>
    </div>
  </section>

  <!-- ============ EXERCISE ============ -->
  <section class="view" id="v-exercise">
    <header class="topbar">
      <button class="icon-btn back-btn" id="back-from-exercise" aria-label="Tilbake">
        <svg width="10" height="18" viewBox="0 0 10 18" fill="none" aria-hidden="true">
          <path d="M9 1L1 9L9 17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 id="exercise-title"></h1>
      <button class="icon-btn more-btn" id="delete-exercise-btn" aria-label="Mer">
        <svg width="18" height="4" viewBox="0 0 18 4" fill="currentColor" aria-hidden="true">
          <circle cx="2" cy="2" r="1.8"/><circle cx="9" cy="2" r="1.8"/><circle cx="16" cy="2" r="1.8"/>
        </svg>
      </button>
    </header>
    <div class="scroll-area" id="sets-area"></div>
    <button class="fab" id="add-set-btn" aria-label="Legg til sett">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    <div class="rest-bar" id="rest-bar" hidden>
      <div class="rest-ring">
        <svg viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="17" class="ring-bg"/>
          <circle cx="20" cy="20" r="17" class="ring-fg" id="rest-ring-fg"/>
        </svg>
        <span class="rest-time" id="rest-time">2:00</span>
      </div>
      <div class="rest-info">
        <div class="rest-title">Hviler…</div>
        <div class="rest-sub">Neste sett om litt</div>
      </div>
      <button class="rest-skip" id="rest-skip">Hopp over</button>
    </div>
  </section>

  <!-- ============ HISTORY ============ -->
  <section class="view" id="v-history">
    <header class="topbar">
      <button class="icon-btn back-btn" id="back-from-history" aria-label="Tilbake">
        <svg width="10" height="18" viewBox="0 0 10 18" fill="none" aria-hidden="true">
          <path d="M9 1L1 9L9 17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1>Historikk</h1>
      <div class="topbar-spacer"></div>
    </header>
    <div class="week-nav">
      <button class="icon-btn week-arrow" id="week-prev" aria-label="Forrige uke">
        <svg width="10" height="18" viewBox="0 0 10 18" fill="none" aria-hidden="true">
          <path d="M9 1L1 9L9 17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span id="week-label"></span>
      <button class="icon-btn week-arrow" id="week-next" aria-label="Neste uke">
        <svg width="10" height="18" viewBox="0 0 10 18" fill="none" aria-hidden="true">
          <path d="M1 1L9 9L1 17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="scroll-area" id="history-content"></div>
  </section>

  <!-- ============ LOG SET MODAL ============ -->
  <div class="modal-backdrop" id="log-modal" hidden>
    <div class="modal-sheet">

      <div class="field-row">
        <button class="field active" id="field-reps" data-field="reps">
          <div class="field-value">5</div>
          <div class="field-label">REPS</div>
        </button>
        <div class="field-divider"></div>
        <button class="field" id="field-kg" data-field="kg">
          <div class="field-value">80</div>
          <div class="field-label">KG</div>
        </button>
      </div>

      <div class="toggle-row">
        <button class="toggle work-toggle active" data-label="work">Arbeidssett</button>
        <button class="toggle warm-toggle" data-label="warm">Oppvarming</button>
      </div>

      <div class="numpad">
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
        <button class="key" data-key="4">4</button>
        <button class="key" data-key="5">5</button>
        <button class="key" data-key="6">6</button>
        <button class="key" data-key="7">7</button>
        <button class="key" data-key="8">8</button>
        <button class="key" data-key="9">9</button>
        <button class="key key-decimal" id="key-decimal" data-key=".">.</button>
        <button class="key" data-key="0">0</button>
        <button class="key key-del" data-key="del" aria-label="Slett">
          <svg width="20" height="15" viewBox="0 0 22 16" fill="none" aria-hidden="true">
            <path d="M8 1H20C20.55 1 21 1.45 21 2V14C21 14.55 20.55 15 20 15H8L1 8L8 1Z"
                  stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <line x1="10.5" y1="5.5" x2="16.5" y2="11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="16.5" y1="5.5" x2="10.5" y2="11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="modal-actions">
        <button class="cancel-btn" id="cancel-set" aria-label="Avbryt">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="save-btn" id="save-set" aria-label="Lagre">
          <svg width="22" height="17" viewBox="0 0 22 17" fill="none" aria-hidden="true">
            <path d="M1 8.5L7.5 15L21 1" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
</body>
</html>
